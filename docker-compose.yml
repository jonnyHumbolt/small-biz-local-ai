

services:
  # CONTAINER 1: The Visual UI Web App
  ai-frontend:
    build: .
    container_name: grocery_ai_frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - OLLAMA_HOST=http://ai-backend:11434
    depends_on:
      - ai-backend

  # CONTAINER 2: The Isolated Local AI Engine
  ai-backend:
    image: ollama/ollama:latest
    container_name: grocery_ai_backend
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    # ⚠️ ADD THESE LINES RIGHT HERE: Forces the container to see the internet
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  ollama_storage:
