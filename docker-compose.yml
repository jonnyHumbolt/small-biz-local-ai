services:
  # CONTAINER 1: The Visual UI Web App
  ai-frontend:
    build: .
    container_name: grocery_ai_frontend
    ports:
      - "127.0.0.1:8501:8501" # 🔒 Locked to your physical laptop only
    volumes:
      - .:/app
    environment:
      - OLLAMA_HOST=http://ai-backend:11434
      - DB_HOST=ai-database
      - DB_NAME=inventory_db
      - DB_USER=postgres
      - DB_PASSWORD=local_secure_pass
      - VENDOR_API_URL=http://mock-vendor:5000/api/v1/orders
    depends_on:
      - ai-database
      - ai-backend
      - mock-vendor

  # CONTAINER 2: The Isolated Local AI Engine
  ai-backend:
    image: ollama/ollama:latest
    container_name: grocery_ai_backend
    expose:
      - "11434"
    volumes:
      - ~/.ollama:/root/.ollama

  # CONTAINER 3: The Enterprise Data Layer (Upgraded for Vector Memory)
  ai-database:
    image: pgvector/pgvector:pg17
    container_name: grocery_ai_database
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=inventory_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=local_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # CONTAINER 4: The Mock Vendor Receiving Gateway
  mock-vendor:
    image: python:3.11-slim
    container_name: mock_vendor_system
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install flask && python mock_vendor_api.py"
    ports:
      - "127.0.0.1:5000:5000" # 🔒 Mock gateway isolated to localhost

volumes:
  postgres_data:
